{% extends 'base.html' %}
{% block title %}Delete Album{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title">Delete Album</h1>
                <p>Are you sure you want to delete the album <strong>{{ object.title }}</strong>? This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a class="btn btn-secondary" href="{% url 'album-detail' object.pk %}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
